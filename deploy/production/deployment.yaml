apiVersion: apps/v1
kind: Deployment
metadata:
  name: howto
  labels:
    app.kubernetes.io/name: howto
    app.kubernetes.io/part-of: howto
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: howto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: howto
        app.kubernetes.io/part-of: howto
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: howto
          image: registry.timolia.systems/web/howto:main-62bd98a-1782710590 # {"$imagepolicy": "web-live:howto"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
